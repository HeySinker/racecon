<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- RACECON Tetris Animation - بسم الله الرحمن الرحيم -->

<svg
   version="1.1"
   id="svg1"
   width="128"
   height="16.228333"
   viewBox="0 0 128 16.228333"
   xmlns="http://www.w3.org/2000/svg">
  <defs id="defs1">
    <style>
      .tetris-drop {
        animation: tetrisDrop 5s cubic-bezier(0.175, 0.885, 0.32, 1.275) infinite;
        transform-origin: center bottom;
      }
      
      .letter-r { animation-delay: 0s; }
      .letter-a { animation-delay: 0.2s; }
      .letter-c1 { animation-delay: 0.4s; }
      .letter-o { animation-delay: 0.8s; }
      .letter-n { animation-delay: 1.0s; }
      
      .e-stripe1 { animation-delay: 1.2s; }
      .e-stripe2 { animation-delay: 1.4s; }
      .e-stripe3 { animation-delay: 1.6s; }
      
      .letter-c2 { 
        animation: tetrisDropFlipped 3s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.6s infinite, 
                   flipToNormal 3s ease-in-out 1s infinite;
        transform-origin: center center;
      }
      
      @keyframes tetrisDrop {
        0% { 
          transform: translateY(-300px) rotateZ(-20deg);
          opacity: 0;
        }
        6% { 
          transform: translateY(-150px) rotateZ(-10deg);
          opacity: 0.3;
        }
        24% { 
          transform: translateY(-10px) rotateZ(0deg);
          opacity: 0.9;
        }
        27% {
          transform: translateY(5px) rotateZ(0deg);
          opacity: 1;
        }
        30% { 
          transform: translateY(0) rotateZ(0deg);
          opacity: 1;
        }
        100% { 
          transform: translateY(0) rotateZ(0deg);
          opacity: 1;
        }
      }
      
      @keyframes tetrisDropFlipped {
        0% { 
          transform: translateY(-300px) rotateZ(-20deg) scaleX(-1);
          opacity: 0;
        }
        6% { 
          transform: translateY(-150px) rotateZ(-10deg) scaleX(-1);
          opacity: 0.3;
        }
        24% { 
          transform: translateY(-10px) rotateZ(0deg) scaleX(-1);
          opacity: 0.9;
        }
        27% {
          transform: translateY(5px) rotateZ(0deg) scaleX(-1);
          opacity: 1;
        }
        30% { 
          transform: translateY(0) rotateZ(0deg) scaleX(-1);
          opacity: 1;
        }
        100% { 
          transform: translateY(0) rotateZ(0deg) scaleX(-1);
          opacity: 1;
        }
      }
      
      @keyframes flipToNormal {
        0%, 50% { transform: scaleX(-1); }
        60% { transform: scaleX(0); }
        70% { transform: scaleX(1); }
        100% { transform: scaleX(1); }
      }
      
      /* Initially hide all elements */
      .tetris-drop, .letter-c2 {
        opacity: 0;
        transform: translateY(-300px) rotateZ(-20deg);
      }
    </style>
  </defs>
  
